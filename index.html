<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3498db">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3048/3048122.png">
    
    <title>健康樂活揮手大挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
    
    <style>
        /* ============================
           核心樣式修改區 (修正電腦排版)
           ============================ */

        body { font-family: '微軟正黑體', sans-serif; background-color: #f0f8ff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        
        /* 1. 放寬電腦版的容器大小 ( max-width: 1500px )，讓結果畫面可以伸展開來 */
        #app-container { width: 100%; max-width: 1500px; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        h1 { color: #2c3e50; font-size: 2em; margin: 10px 0; padding: 0 10px; }
        p.desc { font-size: 1.1em; color: #7f8c8d;}

        .btn { display: inline-block; padding: 15px 30px; font-size: 1.5em; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-decoration: none;}
        #btn-start { background: linear-gradient(45deg, #FF512F, #DD2476); color: white; margin-top: 20px; }
        #btn-start:disabled { background: #bdc3c7; cursor: wait; }

        /* 2. 【修復關鍵】：還原遊戲畫面大小 ( max-width: 640px ) */
        #game-area { display: none; position: relative; width: 100%; max-width: 750px; background: #000; overflow: hidden; }
        #video { width: 100%; height: auto; transform: scaleX(-1); display: block; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 1.8em; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        #loading-status { font-size: 1.2em; color: #f39c12; margin-top: 20px; display: none; font-weight: bold; }
        
        /* 3. 【修復關鍵】：修正電腦結果畫面佈局 */
        #result-screen { 
            display: none; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            gap: 9px; 
            width: 100%; 
            height: 100%; 
            padding-top: 10px; 
            box-sizing: border-box; 
        }
        
        /* 4. 【修復關鍵】：修正結果畫面的照片大小與位置 */
        #final-photo-canvas { 
            border: 5px solid white; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            max-width: 500px; 
            height: auto; 
            margin-top: -12px; 
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="main-menu">
        <h1>💪 健康揮手大挑戰</h1>
        <p>請將手機放好，對著鏡頭揮揮手！</p>
        <button id="btn-start" class="btn" onclick="initGame()" disabled>載入 AI 模型中...</button>
    </div>

    <div id="game-area">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div>分數: <span id="score" style="color: #f1c40f;">0</span></div>
            <div>時間: <span id="timer">15</span>s</div>
        </div>
    </div>

    <div id="result-screen">
        <h2>🎉 挑戰成功！</h2>
        <canvas id="final-photo-canvas"></canvas>
        <p style="font-size: 1.5em; font-weight: bold;">得分：<span id="final-score" style="color: #e74c3c;">0</span></p>
        <p id="upload-status" style="color: #7f8c8d;"></p>
        <div>
            <button class="btn" style="background:#27ae60; color:white;" onclick="sendToGmail()">寄送結果</button>
            <button class="btn" style="background:#3498db; color:white;" onclick="location.reload()">再玩一次</button>
        </div>
    </div>
</div>

<script>
    const GAS_WEB_APP_URL = "你的_GAS_網址"; 
    let net, video = document.getElementById('video'), canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    let score = 0, timeLeft = 15, isGameRunning = false, target = { x: 0, y: 0, radius: 35, active: false };

    // 1. 註冊 Service Worker (PWA)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ready"));
    }

    // 2. 請求通知權限
    window.onload = async () => {
        if ("Notification" in window) Notification.requestPermission();
        try {
            net = await posenet.load({ architecture: 'MobileNetV1', outputStride: 16, multiplier: 0.75 });
            let btn = document.getElementById('btn-start');
            btn.innerText = "開始挑戰"; btn.disabled = false;
        } catch (e) { alert("模型載入失敗"); }
    };

    // 3. 語音功能
    function speak(text) {
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = "zh-TW";
        window.speechSynthesis.speak(msg);
    }

    async function initGame() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            
            video.onplay = () => {
                video.width = video.videoWidth;
                video.height = video.videoHeight;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                isGameRunning = true; score = 0; timeLeft = 15;
                document.getElementById('score').innerText = score;
                document.getElementById('timer').innerText = timeLeft;
                
                spawnTarget(); 
                gameLoop();
                
                timerInterval = setInterval(() => {
                    timeLeft--; document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) endGame();
                }, 1000);
            };
        } catch (e) { alert("無法開啟鏡頭，請確認是否允許相機權限。"); location.reload(); }
    }

    async function gameLoop() {
        if (!isGameRunning) return;
        const pose = await net.estimateSinglePose(video, { flipHorizontal: false });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (target.active) {
            ctx.beginPath(); ctx.arc(target.x, target.y, target.radius, 0, Math.PI*2);
            ctx.fillStyle = "#e74c3c"; ctx.fill(); ctx.closePath();
        }
        const keypoints = pose.keypoints;
        ['leftWrist', 'rightWrist'].forEach(part => {
            const kp = keypoints.find(k => k.part === part);
            if (kp && kp.score > 0.5) {
                ctx.beginPath(); ctx.arc(kp.position.x, kp.position.y, 15, 0, Math.PI*2);
                ctx.fillStyle = "#2ecc71"; ctx.fill();
                let dx = kp.position.x - target.x, dy = kp.position.y - target.y;
                if (Math.sqrt(dx*dx + dy*dy) < target.radius) {
                    score += 10; document.getElementById('score').innerText = score;
                    target.active = false; setTimeout(spawnTarget, 200);
                }
            }
        });
        requestAnimationFrame(gameLoop);
    }

    function spawnTarget() {
        target.x = Math.random() * (canvas.width - 100) + 50;
        target.y = Math.random() * (canvas.height - 100) + 50;
        target.active = true;
    }

    function endGame() {
        isGameRunning = false;
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;

        const finalCanvas = document.getElementById('final-photo-canvas');
        finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
        const fCtx = finalCanvas.getContext('2d');
        fCtx.scale(-1, 1); fCtx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        
        video.srcObject.getTracks().forEach(t => t.stop());
        
        // PWA 本地通知
        if (Notification.permission === "granted") {
            new Notification("挑戰完成！", { body: `你今天獲得了 ${score} 分，真棒！`, icon: "https://cdn-icons-png.flaticon.com/512/3048/3048122.png" });
        }
        speak(`挑戰結束，你一共得到 ${score} 分，太厲害了！`);
    }

    async function sendToGmail() {
        const email = document.getElementById('user-email').value;
        if (!email.includes('@')) return alert("");
        document.getElementById('upload-status').innerText = "發送中...";
        const img = document.getElementById('final-photo-canvas').toDataURL('image/jpeg', 0.7).split(',')[1];
        try {
            await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify({ email, score, image: img }) });
            document.getElementById('upload-status').innerText = "✅ 已送出！";
        } catch (e) { document.getElementById('upload-status').innerText = "❌ 失敗"; }
    }
</script>
</body>
</html>
